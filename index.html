<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cotizador · José Metta Inmobiliaria</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:#e9eaed;color:#1a1a2e;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
.topbar{background:#111827;color:#fff;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-brand{font-family:'Playfair Display',serif;font-size:15px;font-weight:600}
.tb-brand small{display:block;font-family:'Montserrat',sans-serif;font-size:7.5px;letter-spacing:.18em;text-transform:uppercase;opacity:.35;font-weight:400;margin-top:1px}
.tb-right{font-size:10px;text-align:right;opacity:.55}
.tb-right strong{display:block;font-size:12px;font-weight:600;color:#fff;opacity:1}

/* ── LAYOUT ── */
.wrap{flex:1;display:flex;min-height:0;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:292px;flex-shrink:0;background:#fff;border-right:1px solid #e2e4e8;overflow-y:auto;padding:14px 14px 80px}
.slbl{font-size:8.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#9ca3af;margin:14px 0 7px;padding-bottom:3px;border-bottom:1px solid #f0f0f0}
.slbl:first-child{margin-top:0}
.fld{margin-bottom:7px}
.fld label{display:block;font-size:8.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#6b7280;margin-bottom:3px}
input,select{width:100%;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:500;padding:7px 8px;border:1.5px solid #e2e4e8;border-radius:6px;background:#fafafa;color:#1a1a2e;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--ac,#6366f1);background:#fff}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}

/* ── PROYECTO PILLS ── */
.proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.pp{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 5px;border:1.5px solid #e2e4e8;border-radius:7px;cursor:pointer;transition:all .15s;background:#fafafa;text-align:center}
.pp:hover{border-color:#bbb}
.pp.on{border-color:var(--pc);background:var(--pcl);box-shadow:0 0 0 2px color-mix(in srgb,var(--pc) 15%,transparent)}
.pp-logo{height:30px;display:flex;align-items:center;justify-content:center}
.pp-logo img{max-height:28px;max-width:100px;object-fit:contain}
.pp-logo-dk{background:#1a1209;border-radius:4px;padding:3px 7px}
.pp-name{font-size:8px;font-weight:700;color:#374151;line-height:1.2}
.pp-loc{font-size:7.5px;color:#9ca3af}

/* ── PRECIO MANUAL ── */
.precio-manual{display:none;padding:8px 10px;background:#fffbeb;border:1.5px solid #f59e0b;border-radius:7px;margin-top:4px}
.precio-manual.show{display:block}
.precio-manual label{font-size:8.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#b45309;display:block;margin-bottom:4px}
.precio-manual input{border-color:#f59e0b}
.precio-manual-hint{font-size:8px;color:#b45309;margin-top:3px;line-height:1.4}

/* ── PLAN CARDS ── */
.plan-cards{display:flex;flex-direction:column;gap:5px}
.plan-card{border:1.5px solid #e2e4e8;border-radius:7px;padding:8px 10px;cursor:pointer;transition:all .15s;background:#fafafa}
.plan-card:hover{border-color:#bbb;background:#f5f5f5}
.plan-card.on{border-color:var(--ac);background:color-mix(in srgb,var(--ac) 6%,white);box-shadow:0 0 0 2px color-mix(in srgb,var(--ac) 15%,transparent)}
.pc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.pc-label{font-size:11px;font-weight:700;color:#1a1a2e}
.pc-dto{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--ac);color:#fff}
.pc-dto.cero{background:#e5e7eb;color:#6b7280}
.pc-detalle{font-size:9px;color:#6b7280;line-height:1.4}
.pc-nums{display:flex;gap:10px;margin-top:4px}
.pc-num{font-size:8.5px;color:#9ca3af}
.pc-num strong{color:#374151;font-weight:600}

/* ── APARTADO BOX ── */
.apartado-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:7px;padding:8px 10px;margin-top:6px;font-size:9px;color:#166534;line-height:1.5}
.apartado-box strong{font-weight:700;font-size:10px}

/* ── BTN GENERAR ── */
.btn-gen{width:100%;padding:12px;border:none;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;background:var(--ac,#374151);color:#fff;transition:opacity .15s;margin-top:10px}
.btn-gen:hover{opacity:.85}

/* ── PREVIEW ── */
.pv{flex:1;overflow-y:auto;overflow-x:auto;padding:18px;display:flex;flex-direction:column;align-items:center;gap:10px;background:#dde0e5}

/* ── PRINT BAR ── */
.pbar{width:700px;background:#111827;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-radius:6px;flex-shrink:0}
.pbar-folio{font-size:11px;color:rgba(255,255,255,.4)}
.btn-print{padding:7px 16px;color:#fff;border:none;border-radius:5px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.04em}

/* ══════════════════════════════════════
   PDF — formato idéntico al de Sebastián
   ══════════════════════════════════════ */
.pdf{background:#fff;width:700px;box-shadow:0 4px 32px rgba(0,0,0,.18);border-radius:2px;overflow:hidden;flex-shrink:0}

.pdf-hdr{padding:20px 30px 14px;display:flex;justify-content:space-between;align-items:flex-start}
.pdf-logo{height:54px;display:flex;align-items:center}
.pdf-logo img{max-height:52px;max-width:185px;object-fit:contain}
.pdf-logo-dk{background:#1a1209;border-radius:5px;padding:5px 11px}
.pdf-asesor{text-align:right}
.pdf-aslbl{font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;color:#aaa;margin-bottom:2px}
.pdf-asnom{font-size:13px;font-weight:700;color:#111}
.pdf-astel{font-size:11.5px;font-weight:600;margin-top:2px}
.pdf-asfecha{font-size:9.5px;color:#aaa;margin-top:3px}

.pdf-body{padding:0 30px 22px}
.sec{margin-top:13px;border:1px solid #ccc;border-radius:1px;overflow:hidden}
.sec-hdr{padding:6px 12px;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#fff}
.sec-grid{display:grid;grid-template-columns:1fr 1fr}
.cell{padding:8px 12px;border-bottom:1px solid #f0f0f0;display:flex;align-items:baseline;gap:6px}
.cell:nth-child(odd){border-right:1px solid #f0f0f0}
.cell:last-child,.cell:nth-last-child(2):nth-child(odd){border-bottom:none}
.cell-lbl{font-size:7.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#aaa;min-width:82px;flex-shrink:0}
.cell-val{font-size:12px;font-weight:700;color:#111;word-break:break-word}

.ptbl{width:100%;border-collapse:collapse}
.ptbl th{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;padding:7px 11px;text-align:left}
.ptbl th:nth-child(2){text-align:center;width:50px}
.ptbl th:nth-child(3){text-align:right;width:135px}
.ptbl th:last-child{text-align:right}
.ptbl td{padding:8px 11px;font-size:11px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.ptbl td:nth-child(2){text-align:center;font-weight:600}
.ptbl td:nth-child(3){text-align:right;font-weight:700}
.ptbl td:last-child{text-align:right;color:#666;font-size:10px}
.ptbl .tot td{font-weight:700;font-size:12px;border-bottom:none;color:#fff}
.ptbl .tot td:last-child{color:#fff;font-size:11px}
.acc{font-weight:700}

.resumen{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid #ccc;margin-top:13px;border-radius:1px;overflow:hidden}
.rc{padding:11px 6px;border-right:1px solid #ccc;text-align:center}
.rc:last-child{border-right:none}
.rc-lbl{font-size:7px;letter-spacing:.07em;text-transform:uppercase;color:#aaa;font-weight:600;margin-bottom:4px;line-height:1.35}
.rc-val{font-size:13px;font-weight:700}
.rc-sub{font-size:8px;color:#aaa;margin-top:2px}

.pdf-foot{margin:11px 30px 16px;border-top:1px solid #eee;padding-top:8px;font-size:7.5px;color:#aaa;text-align:center;line-height:1.7;font-style:italic}

.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:420px;color:#bbb;font-size:12px;gap:10px;text-align:center;padding:40px;width:700px}

@media print{
  html,body{height:auto;overflow:visible}
  .topbar,.sb,.pbar{display:none!important}
  .wrap{display:block;overflow:visible}
  .pv{padding:0;background:#fff;display:block;overflow:visible}
  .pdf{box-shadow:none;width:100%;max-width:100%}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-brand">José Metta Inmobiliaria<small>Sistema de cotización</small></div>
  <div class="tb-right"><strong id="hn">José Metta</strong>Asesor de ventas</div>
</div>

<div class="wrap">
<!-- ═══ SIDEBAR ═══ -->
<aside class="sb">

  <p class="slbl">Asesor</p>
  <div class="fld"><label>Nombre</label><input id="a-nom" value="José Metta" oninput="sync()"></div>
  <div class="g2">
    <div class="fld"><label>Teléfono</label><input id="a-tel" value="55 6783 2774"></div>
    <div class="fld"><label>Fecha</label><input type="date" id="a-fch"></div>
  </div>

  <p class="slbl">Cliente</p>
  <div class="fld"><label>Nombre completo</label><input id="c-nom" placeholder="Nombre del cliente"></div>
  <div class="g2">
    <div class="fld"><label>Teléfono</label><input id="c-tel" placeholder="55 0000 0000"></div>
    <div class="fld"><label>Correo</label><input id="c-mail" placeholder="correo@email.com"></div>
  </div>

  <p class="slbl">Desarrollo</p>
  <div class="proj-grid" id="pgrid"></div>

  <div id="sel" style="display:none">
    <p class="slbl">Torre / Edificio</p>
    <div class="fld"><select id="s-tor" onchange="loadDeps()"><option value="">— Seleccionar —</option></select></div>

    <p class="slbl">Departamento</p>
    <div class="fld"><select id="s-dep" onchange="onDep()"><option value="">— Seleccionar —</option></select></div>
    <div class="precio-manual" id="precio-manual">
      <label>Precio de venta (ingresar)</label>
      <input type="number" id="p-precio" placeholder="Ej. 5500000" min="0" step="1000">
      <div class="precio-manual-hint">Depto sin precio en lista. Ingrésalo aquí.</div>
    </div>

    <p class="slbl">Plan de financiamiento</p>
    <div class="plan-cards" id="plan-cards"></div>
    <div class="apartado-box" id="apartado-box" style="display:none"></div>

    <button class="btn-gen" onclick="generar()">Generar cotización →</button>
  </div>

</aside>

<!-- ═══ PREVIEW ═══ -->
<main class="pv" id="pv">
  <div class="pdf" id="pdf">
    <div class="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Selecciona desarrollo y departamento<br>para generar la cotización
    </div>
  </div>
</main>
</div>

/* ── PILLS ── */
function buildPills(){
  const g=$('pgrid'); g.innerHTML='';
  for(const [k,p] of Object.entries(DATA)){
    const d=document.createElement('div');
    d.className='pp'; d.id='pp-'+k;
    d.style.setProperty('--pc',p.c1);
    d.style.setProperty('--pcl',alpha(p.c1,.08));
    const lTag=p.dark
      ?`<div class="pp-logo-dk"><img src="${LOGOS[p.logo]}" style="max-height:22px;max-width:86px;object-fit:contain"></div>`
      :`<img src="${LOGOS[p.logo]}" style="max-height:26px;max-width:96px;object-fit:contain">`;
    d.innerHTML=`<div class="pp-logo">${lTag}</div><div class="pp-name">${p.nombre}</div><div class="pp-loc">${p.lugar}</div>`;
    d.onclick=()=>selProy(k);

/* ── SELECT PROYECTO ── */
function selProy(k){
  proy=k; dep=null; planActivo=null;
  document.querySelectorAll('.pp').forEach(p=>p.classList.remove('on'));
  $('pp-'+k).classList.add('on');
  document.documentElement.style.setProperty('--ac',DATA[k].c1);

  const ts=$('s-tor'); ts.innerHTML='<option value="">— Seleccionar —</option>';
  Object.keys(DATA[k].torres).forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;ts.appendChild(o)});
  $('s-dep').innerHTML='<option value="">— Seleccionar —</option>';
  $('precio-manual').classList.remove('show');

  buildPlanCards(k);
  $('sel').style.display='block';
  placeholder();
}

/* ── PLAN CARDS ── */
function buildPlanCards(k){
  const pl=PLANES[k];
  const container=$('plan-cards');
  container.innerHTML='';
  planActivo=null;

  pl.planes.forEach((plan,i)=>{
    const d=document.createElement('div');
    d.className='plan-card'; d.id='pc-'+i;
    const dtoTag=plan.dto>0
      ?`<span class="pc-dto">${plan.dto}% dto</span>`
      :`<span class="pc-dto cero">sin dto</span>`;
    const mensInfo=plan.meses>0?`<div class="pc-num">Mensual. <strong>${plan.mens}% / ${plan.meses} meses</strong></div>`:'';
    d.innerHTML=`
      <div class="pc-header"><span class="pc-label">${plan.label}</span>${dtoTag}</div>
      <div class="pc-detalle">${plan.detalle}</div>
      <div class="pc-nums">
        <div class="pc-num">Enganche <strong>${plan.eng}%</strong></div>
        ${mensInfo}
        <div class="pc-num">Saldo <strong>${plan.sal}%</strong></div>
      </div>`;
    d.onclick=()=>selectPlan(i);
    container.appendChild(d);
  });

  // Apartado info
  const ab=$('apartado-box');
  ab.style.display='block';
  ab.innerHTML=`<strong>Apartado: ${pl.label_apartado}</strong>${pl.banco?'<br>'+pl.banco:''}`;
}

function selectPlan(i){
  planActivo=i;
  document.querySelectorAll('.plan-card').forEach((c,j)=>c.classList.toggle('on',j===i));
}

function loadDeps(){
  const tor=$('s-tor').value; dep=null;
  $('precio-manual').classList.remove('show');
  const s=$('s-dep'); s.innerHTML='<option value="">— Seleccionar —</option>';
  if(!tor||!proy)return;
  DATA[proy].torres[tor].forEach((u,i)=>{
    const o=document.createElement('option'); o.value=i;
    const pr=u.p?' — '+fmt(u.p):' — Precio a consultar';
    o.textContent=`Dpto ${u.d} · Niv ${u.n} · ${u.t}${pr}`;
    s.appendChild(o);
  });
}

function onDep(){
  const i=$('s-dep').value, tor=$('s-tor').value;
  if(i===''||!proy||!tor){dep=null;$('precio-manual').classList.remove('show');return;}
  dep=DATA[proy].torres[tor][parseInt(i)];
  $('p-precio').value='';
  if(dep.p) $('precio-manual').classList.remove('show');
  else{$('precio-manual').classList.add('show');setTimeout(()=>$('p-precio').focus(),50);}
}

function getPrecio(){

      '<div class="cell"><span class="cell-lbl">Nivel</span><span class="cell-val">'+dep.n+'</span></div>'+
      '<div class="cell"><span class="cell-lbl">Tipo / Superficie</span><span class="cell-val">'+tipoSup+'</span></div>'+
      '<div class="cell"><span class="cell-lbl">Financiamiento</span><span class="cell-val">'+plan.label+(plan.dto>0?' · '+plan.dto+'% dto':'')+'</span></div>'+
      '<div class="cell"><span class="cell-lbl">Precio de Venta</span><span class="cell-val" style="color:'+p.c1+'">'+fmt(precio)+'</span></div>'+
    '</div>'+
  '</div>'+
  '<div class="sec">'+
    '<div class="sec-hdr" style="background:'+p.c1+'">Plan de Pagos</div>'+
    '<table class="ptbl"><thead><tr>'+
      '<th style="background:'+p.c1+'">Concepto</th>'+
      '<th style="background:'+p.c1+'">%</th>'+
      '<th style="background:'+p.c1+'">Monto</th>'+
      '<th style="background:'+p.c1+'">Detalle</th>'+
    '</tr></thead><tbody>'+
      rowDto+
      '<tr><td>Apartado</td><td>—</td><td>'+fmt(apartadoMonto)+'</td><td>A la reserva</td></tr>'+
      '<tr><td>Enganche a la firma del contrato</td><td>'+plan.eng+'%</td><td>'+fmt(eng)+'</td><td>Pago único a la firma</td></tr>'+
      rowObra+rowMens+salRow+
      '<tr class="tot" style="background:'+p.c1+'"><td>Precio Total de Venta</td><td>100%</td><td>'+fmt(precio)+'</td><td></td></tr>'+
    '</tbody></table>'+
  '</div>'+
  '<div class="resumen">'+
    '<div class="rc"><div class="rc-lbl">Precio de Venta</div><div class="rc-val" style="color:'+p.c1+'">'+fmt(precio)+'</div></div>'+
    '<div class="rc"><div class="rc-lbl">'+plan.eng+'% Enganche Firma</div><div class="rc-val" style="color:'+p.c1+'">'+fmt(eng)+'</div></div>'+
    rc3+
    '<div class="rc"><div class="rc-lbl">'+(sal>0?sal+'% Saldo Escritura':'Saldo')+'</div><div class="rc-val" style="color:'+p.c1+'">'+(sal>0?fmt(saldo):'—')+'</div></div>'+
  '</div>'+
'</div>'+
'<div class="pdf-foot">Esta cotización tiene una vigencia de 30 días naturales a partir de la fecha de emisión. Precios en moneda nacional (MXN) e incluyen IVA. Apartado mínimo '+fmt(apartadoMonto)+' para reservar la unidad.'+bancoLine+' · Folio COT-'+folio+'</div>';

  removePbar();
  const bar=document.createElement('div');
  bar.id='pbar'; bar.className='pbar';
  bar.innerHTML='<span class="pbar-folio">Folio: COT-'+folio+' · '+plan.label+'</span>'
    +'<button class="btn-print" style="background:'+p.c1+'" onclick="imprimir()">⬇ Imprimir / Guardar PDF</button>';
  $('pv').insertBefore(bar,$('pdf'));
  $('pv').scrollTo({top:0,behavior:'smooth'});
}

/* ── IMPRIMIR ── */
function imprimir(){
  if(!proy)return;
  document.querySelectorAll('.topbar,.sb,.pbar').forEach(el=>el.style.display='none');
  const pv=$('pv'), pdf=$('pdf');
  const pvS=pv.style.cssText, pdfS=pdf.style.cssText;
  pv.style.cssText='display:block;padding:0;background:#fff;overflow:visible';
  pdf.style.cssText='width:100%;max-width:100%;box-shadow:none;border-radius:0';
  window.print();
  setTimeout(()=>{
    document.querySelectorAll('.topbar,.sb,.pbar').forEach(el=>el.style.display='');
    pv.style.cssText=pvS; pdf.style.cssText=pdfS;
  },1200);
}
</script>
